# =============================================================================
# Experience Profile — Portable Template
# =============================================================================
# This file is your canonical source of professional experiences.
# Fill it in using the Experience Capture prompt kit, or manually.
#
# Rules:
#   - Be specific and factual (numbers, tools, outcomes when available)
#   - Use action verbs ("designed", "implemented", "led", "analyzed",
#     "facilitated", "authored", "researched", "taught")
#   - Don't self-censor — include everything; tailoring happens later
#   - Add new experiences at the top of the list (most recent first)
#   - Outcomes can be quantitative OR qualitative — both matter
# =============================================================================

profile:
  name: ""                    # Full name
  email: ""                   # Professional email
  phone: ""                   # Optional
  location: ""                # City, Country (or "Remote")
  linkedin: ""                # LinkedIn URL (optional)
  portfolio: ""               # Website / GitHub / portfolio (optional)

  # 2-3 sentence professional summary — updated as your profile evolves.
  # Focus on: who you are, what you do, what value you bring.
  summary: ""

# =============================================================================
# EXPERIENCES
# =============================================================================
# Each entry is one role, project, internship, volunteering, or significant
# activity. Include EVERYTHING — the resume builder will select what fits.
#
# type: work | internship | project | volunteering | freelance | research
#        teaching | fieldwork | thesis | practicum | competition | editorial
# =============================================================================

experiences:

  - title: ""                 # Your role or title
    organization: ""          # Company, university, org, or "Personal Project"
    type: ""                  # work | internship | project | volunteering | freelance | research
                              # teaching | fieldwork | thesis | practicum | competition | editorial
    start_date: ""            # Mon YYYY (e.g., Jan 2024)
    end_date: ""              # Mon YYYY or "Present"
    location: ""              # City, Country or "Remote"

    # What was this role/project about? 1-2 sentences of context.
    context: ""

    # What did YOU do? Use action verbs. One action per line.
    actions:
      - ""

    # Tools, methods, skills, and approaches you used.
    # Examples: software, lab equipment, research methods, frameworks, writing
    # styles, facilitation techniques, analytical approaches.
    skills:
      - ""

    # Results, impact, or artifacts produced.
    # Quantitative when possible: "reduced load time by 40%", "served 200+ users"
    # Qualitative is equally valid: "published peer-reviewed paper",
    #   "improved team onboarding process", "presented findings to faculty",
    #   "received departmental recognition".
    outcomes:
      - ""

    # What did you learn or how did you grow from this experience?
    learnings:
      - ""

    # ATS-relevant keywords — terms a recruiter or system might search for.
    keywords:
      - ""

# =============================================================================
# EDUCATION
# =============================================================================

education:

  - degree: ""                # e.g., "B.S. Computer Science"
    institution: ""
    start_date: ""            # Mon YYYY
    end_date: ""              # Mon YYYY or "Expected Mon YYYY"
    location: ""
    gpa: ""                   # Optional — include if strong or required
    highlights:               # Relevant coursework, honors, thesis, activities
      - ""

# =============================================================================
# SKILLS INVENTORY
# =============================================================================
# Comprehensive list — the resume builder will pick what's relevant.

skills_inventory:

  technical:                  # Tools, software, methods, frameworks, platforms
    - ""                      # e.g., Python, SPSS, Figma, MATLAB, qualitative coding,
                              #       GIS, LaTeX, laboratory techniques, survey design

  interpersonal:              # Leadership, communication, teamwork, facilitation, etc.
    - ""

  languages:                  # Spoken/written languages and proficiency
    - language: ""
      proficiency: ""         # native | fluent | professional | conversational | basic

# =============================================================================
# PUBLICATIONS & PORTFOLIO (optional)
# =============================================================================
# Academic papers, articles, blog posts, creative works, or portfolio pieces.

publications:
  - title: ""
    venue: ""                 # Journal, conference, blog, publication name
    date: ""                  # Mon YYYY
    url: ""                   # Link (optional)
    role: ""                  # e.g., "first author", "co-author", "contributor"

portfolio_pieces:
  - title: ""
    description: ""           # 1 sentence — what it is and why it matters
    url: ""                   # Link to the work (optional)

# =============================================================================
# AWARDS & COMPETITIONS (optional)
# =============================================================================

awards:
  - title: ""                 # e.g., "Dean's List", "Best Paper Award", "Hackathon Winner"
    issuer: ""                # Organization or event that granted it
    date: ""                  # Mon YYYY

# =============================================================================
# INTERESTS (optional)
# =============================================================================
# Hobbies, causes, communities — useful for cultural fit and conversation starters.

interests:
  - ""

# =============================================================================
# CERTIFICATIONS & COURSES (optional)
# =============================================================================

certifications:
  - name: ""
    issuer: ""
    date: ""                  # Mon YYYY
    url: ""                   # Verification link (optional)
